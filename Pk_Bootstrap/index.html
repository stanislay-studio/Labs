<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная №12 — Bootstrap 3 | Вариант 8</title>
    
    <!-- Bootstrap 3.3.7 CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    
    <!-- Собственные стили -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Ряд 1 -->
    <div class="row row-1">
        <div class="col-xs-12 col-sm-12 col-md-5 col-lg-5 block block-blue">
            Блок 1.1 (первый ряд)
        </div>
        <div class="col-xs-12 col-sm-12 col-md-5 col-lg-5 block block-blue">
            Блок 1.2 (первый ряд)
        </div>
    </div>

    <!-- Ряд 2 -->
    <div class="row row-2">
        <div class="col-xs-12 col-sm-12 col-md-8 col-lg-8 block block-green">
            Блок 2.1 (8 колонок)
        </div>
        <div class="col-xs-12 col-sm-12 col-md-2 col-lg-2 block block-green">
            Блок 2.2
        </div>
        <div class="col-xs-12 col-sm-12 col-md-2 col-lg-2 block block-green hidden-sm">
            Блок 2.3 (исчезает на sm)
        </div>
    </div>

    <!-- Ряд 3 -->
    <div class="row row-3">
        <div class="col-xs-12 block block-purple">
            Блок 3.1 (один блок на всю ширину)
        </div>
    </div>

    <!-- Ряд 4 -->
    <div class="row row-4">
        <div class="col-xs-12 block block-orange">
            Блок 4.1 (один блок на всю ширину)
        </div>
    </div>

</div>

<!-- jQuery + Bootstrap JS -->



<!-- Собственный скрипт -->
<script src="script.js"></script>

</body>
</html>
